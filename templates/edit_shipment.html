<!DOCTYPE html>
<html>
<head>
    <title>Edit Shipment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 col-md-8 mx-auto">

        <h2 class="fw-bold">Edit Shipment</h2>
        <p class="text-muted">Update sender, receiver and service details.</p>

        <form method="POST">

            <h5>Sender Details</h5>

            <input class="form-control mb-3" name="sender_name"
                   value="{{ shipment.sender_name }}" required>

            <input class="form-control mb-3" name="sender_email"
                   value="{{ shipment.sender_email }}" required>

            <input class="form-control mb-3" name="sender_phone"
                   value="{{ shipment.sender_phone }}" required>

            <h5>Receiver Details</h5>

            <input class="form-control mb-3" name="receiver_name"
                   value="{{ shipment.receiver_name }}" required>

            <input class="form-control mb-3" name="receiver_email"
                   value="{{ shipment.receiver_email }}" required>

            <input class="form-control mb-3" name="receiver_phone"
                   value="{{ shipment.receiver_phone }}" required>

            <h5>Shipment Service</h5>

            <input class="form-control mb-3" name="service"
                   value="{{ shipment.service }}" required>

            <button class="btn btn-dark w-100" type="submit">
                Save Changes
            </button>

        </form>

        <br>
        <a href="/admin-ui/shipments">Back to Shipments</a>

    </div>
</div>

</body>
</html>
