<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Shipment — DeliveryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--sidebar-bg:#0f172a;--sidebar-w:240px;--accent:#3b82f6;--accent-dark:#1d4ed8;--page-bg:#f1f5f9;--card-bg:#ffffff;--text-primary:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--radius:14px;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Inter',sans-serif;background:var(--page-bg);color:var(--text-primary);display:flex;min-height:100vh;}
        .sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);min-height:100vh;display:flex;flex-direction:column;padding:24px 16px;position:fixed;top:0;left:0;z-index:100;}
        .sidebar-brand{display:flex;align-items:center;gap:10px;padding:0 8px 28px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:20px;}
        .brand-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;flex-shrink:0;}
        .brand-name{font-size:15px;font-weight:700;color:white;line-height:1.2;}
        .brand-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;}
        .nav-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;padding:0 12px;margin-bottom:8px;}
        .nav-link-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;font-weight:500;margin-bottom:2px;transition:all .18s;}
        .nav-link-item i{width:18px;text-align:center;font-size:13px;}
        .nav-link-item:hover{background:rgba(255,255,255,.07);color:white;}
        .nav-link-item.active{background:var(--accent);color:white;}
        .main{margin-left:var(--sidebar-w);flex:1;padding:32px;min-width:0;}
        .page-title{font-size:26px;font-weight:800;margin-bottom:4px;}
        .page-subtitle{font-size:14px;color:var(--text-muted);margin-bottom:28px;}
        .edit-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:700px;}
        .id-badge{display:inline-flex;align-items:center;gap:10px;background:#f1f5f9;border:1px solid var(--border);border-radius:10px;padding:12px 18px;margin-bottom:24px;}
        .id-badge .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
        .id-badge .value{font-size:18px;font-weight:800;color:var(--text-primary);}
        .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:14px;margin-top:22px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
        .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
        .field-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
        .field-input{height:42px;border:1px solid var(--border);border-radius:9px;padding:0 13px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-primary);background:white;transition:border .18s,box-shadow .18s;}
        .field-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
        .field-select{height:42px;border:1px solid var(--border);border-radius:9px;padding:0 13px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-primary);background:white;}
        .field-select:focus{outline:none;border-color:var(--accent);}
        .btn-row{display:flex;gap:12px;margin-top:24px;}
        .submit-btn{height:44px;background:var(--text-primary);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:0 24px;font-family:'Inter',sans-serif;transition:background .18s;}
        .submit-btn:hover{background:#1e293b;}
        .cancel-btn{height:44px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:0 20px;text-decoration:none;font-family:'Inter',sans-serif;transition:all .18s;}
        .cancel-btn:hover{border-color:var(--accent);color:var(--accent);}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-truck-fast"></i></div>
        <div><div class="brand-name">DeliveryHub</div><div class="brand-sub">Admin Console</div></div>
    </div>
    <div class="nav-label">Menu</div>
    <a href="/admin-ui" class="nav-link-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="/admin-ui/applications" class="nav-link-item"><i class="fa-solid fa-building"></i> Applications</a>
    <a href="/admin-ui/auth-logs" class="nav-link-item"><i class="fa-solid fa-shield-halved"></i> Auth Logs</a>
    <a href="/admin-ui/shipments" class="nav-link-item active"><i class="fa-solid fa-boxes-stacked"></i> Shipments</a>
    <a href="/admin-ui/upload-label" class="nav-link-item"><i class="fa-solid fa-file-arrow-up"></i> Upload Label</a>
    <a href="/admin-ui/invoice-generator" class="nav-link-item"><i class="fa-solid fa-file-invoice"></i> Invoice Generator</a>
</nav>

<main class="main">
    <div class="page-title">Edit Shipment</div>
    <div class="page-subtitle">Update sender, receiver and service details. Only Shipment ID is locked.</div>

    <div class="edit-card">

        <!-- Shipment ID — read only -->
        <div class="id-badge">
            <i class="fa-solid fa-lock" style="color:var(--text-muted)"></i>
            <div>
                <div class="label">Shipment ID (read-only)</div>
                <div class="value">#{{ shipment.shipment_id }}</div>
            </div>
        </div>

        <form method="POST">

            <!-- SENDER -->
            <div class="section-label"><i class="fa-solid fa-user"></i> Sender Details</div>

            <div class="field-grid">
                <div class="field-group">
                    <label class="field-label">Name</label>
                    <input class="field-input" name="sender_name"
                           value="{{ shipment.sender_name }}" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Email</label>
                    <input class="field-input" type="email" name="sender_email"
                           value="{{ shipment.sender_email or '' }}"
                           placeholder="sender@example.com">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Phone</label>
                <input class="field-input" name="sender_phone"
                       value="{{ shipment.sender_phone or '' }}"
                       placeholder="+1 9254135958">
            </div>

            <!-- RECEIVER -->
            <div class="section-label"><i class="fa-solid fa-location-dot"></i> Receiver Details</div>

            <div class="field-grid">
                <div class="field-group">
                    <label class="field-label">Name</label>
                    <input class="field-input" name="receiver_name"
                           value="{{ shipment.receiver_name }}" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Email</label>
                    <input class="field-input" type="email" name="receiver_email"
                           value="{{ shipment.receiver_email or '' }}"
                           placeholder="receiver@example.com">
                </div>
            </div>
            <div class="field-group">
                <label class="field-label">Phone</label>
                <input class="field-input" name="receiver_phone"
                       value="{{ shipment.receiver_phone or '' }}"
                       placeholder="+91 9876543210">
            </div>

            <!-- SERVICE -->
            <div class="section-label"><i class="fa-solid fa-truck"></i> Shipment Service</div>

            <div class="field-group">
                <label class="field-label">Service Type</label>
                <select class="field-select" name="service" required>
                    <option value="US_TO_INDIA_DOCUMENT_EXPRESS"  {% if shipment.service == "US_TO_INDIA_DOCUMENT_EXPRESS"  %}selected{% endif %}>USA → India — Documents (Express)</option>
                    <option value="US_TO_INDIA_DOCUMENT_ECONOMY"  {% if shipment.service == "US_TO_INDIA_DOCUMENT_ECONOMY"  %}selected{% endif %}>USA → India — Documents (Economy)</option>
                    <option value="US_TO_INDIA_PARCEL_EXPRESS"    {% if shipment.service == "US_TO_INDIA_PARCEL_EXPRESS"    %}selected{% endif %}>USA → India — Parcel (Express)</option>
                    <option value="US_TO_INDIA_PARCEL_PRIORITY"   {% if shipment.service == "US_TO_INDIA_PARCEL_PRIORITY"   %}selected{% endif %}>USA → India — Parcel (Priority)</option>
                    <option value="INDIA_TO_US_DOCUMENT_EXPRESS"  {% if shipment.service == "INDIA_TO_US_DOCUMENT_EXPRESS"  %}selected{% endif %}>India → USA — Documents (Express)</option>
                    <option value="INDIA_TO_US_PARCEL_PRIORITY"   {% if shipment.service == "INDIA_TO_US_PARCEL_PRIORITY"   %}selected{% endif %}>India → USA — Parcel (Priority)</option>
                    {% if shipment.service not in ["US_TO_INDIA_DOCUMENT_EXPRESS","US_TO_INDIA_DOCUMENT_ECONOMY","US_TO_INDIA_PARCEL_EXPRESS","US_TO_INDIA_PARCEL_PRIORITY","INDIA_TO_US_DOCUMENT_EXPRESS","INDIA_TO_US_PARCEL_PRIORITY"] %}
                    <option value="{{ shipment.service }}" selected>{{ shipment.service }} (current)</option>
                    {% endif %}
                </select>
            </div>

            <div class="btn-row">
                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
                <a href="/admin-ui/shipments" class="cancel-btn">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </a>
            </div>

        </form>
    </div>
</main>

</body>
</html>
