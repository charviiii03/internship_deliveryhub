<!DOCTYPE html>
<html>
<head>
    <title>Upload Label - DeliveryHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f7f9fc;
            font-family: Arial, sans-serif;
        }

        .upload-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .upload-header {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .upload-body {
            padding: 35px;
            background: white;
        }

        .pdf-box {
            border: 2px dashed #cbd5e1;
            border-radius: 18px;
            padding: 30px;
            background: #f8fafc;
            text-align: center;
        }

        .form-control {
            border-radius: 10px;
            height: 45px;
        }

        .btn-upload {
            height: 48px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card upload-card col-md-6 mx-auto">

        <div class="upload-header">
            <i class="fa-solid fa-file-pdf fa-4x mb-3"></i>
            <h2 class="fw-bold">Upload Shipment Label</h2>
            <p class="mb-0">
                Upload a PDF label and send it automatically to the receiver.
            </p>
        </div>

        <div class="upload-body">

            <form method="POST" action="/admin-ui/upload-label" enctype="multipart/form-data">

                <div class="mb-4">
                    <label class="form-label fw-semibold">Shipment ID</label>
                    <input
                        type="text"
                        name="shipment_id"
                        class="form-control"
                        value="{{ shipment_id or '' }}"
                        placeholder="Example: 1"
                        required
                    >
                    <small class="text-muted">
                        Receiver email will be fetched automatically from this shipment.
                    </small>
                </div>

                <div class="pdf-box mb-4">
                    <i class="fa-solid fa-cloud-arrow-up fa-3x text-primary mb-3"></i>

                    <h5 class="fw-bold">Select PDF Label</h5>
                    <p class="text-muted small mb-3">
                        Only PDF files are allowed.
                    </p>

                    <input
                        type="file"
                        name="label_file"
                        class="form-control"
                        accept="application/pdf"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-dark btn-upload w-100">
                    <i class="fa-solid fa-upload me-2"></i>
                    Upload and Email Label
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="/admin-ui/shipments" class="text-decoration-none">
                    <i class="fa-solid fa-arrow-left me-1"></i>
                    Back to Shipments
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
