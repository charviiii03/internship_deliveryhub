<!DOCTYPE html>
<html>
<head>
    <title>Upload Label - DeliveryHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">

        <h2>Upload Shipment Label</h2>
        <p class="text-muted">Only PDF files are allowed.</p>

        <form method="POST" action="/admin-ui/upload-label" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Shipment ID</label>
                <input type="text" name="shipment_id" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Customer Email</label>
                <input type="email" name="customer_email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload PDF Label</label>
                <input type="file" name="label_file" class="form-control" accept="application/pdf" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Upload Label
            </button>

        </form>

        <br>
        <a href="/admin-ui/shipments">Back to Shipments</a>

    </div>

</div>

</body>
</html>
