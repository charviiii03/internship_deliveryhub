<!DOCTYPE html>
<html>
<head>
    <title>Create Shipment from Text</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 col-md-8 mx-auto">

        <h2 class="fw-bold">Create Shipment from Text</h2>
        <p class="text-muted">
            Paste sender and receiver details. The system will automatically create a shipment request.
        </p>

        <form method="POST" action="/admin-ui/create-shipment-from-text">

            <div class="mb-3">
                <label class="form-label fw-semibold">Shipment Message</label>

                <textarea
                    name="shipment_text"
                    class="form-control"
                    rows="12"
                    placeholder="Paste sender and receiver details here..."
                    required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Service</label>
                <input
                    type="text"
                    name="service"
                    class="form-control"
                    value="Express International"
                    required>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                Create Shipment Automatically
            </button>

        </form>

        <br>
        <a href="/admin-ui/shipments">Back to Shipments</a>

    </div>

</div>

</body>
</html>
